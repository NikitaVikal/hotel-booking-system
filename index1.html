<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotel Reservation System</title>
  <link rel="stylesheet" href="style1.css">
</head>
<body>

  <h1>Hotel Room Reservation</h1>

  <div class="controls">
    <input type="number" id="roomCount" min="1" max="5" placeholder="Enter rooms (1-5)">
    <button onclick="bookRooms()">Book Rooms</button>
    <button onclick="randomOccupancy()">Random Occupancy</button>
    <button onclick="reset()">Reset</button>
  </div>

  <h3 id="output"></h3>

  <div id="hotel"></div>

  <script src="script1.js"></script>
</body>
</html>
